<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>AEGIS — Inscription</title>
  <meta name="description" content="Creez votre compte AEGIS et lancez votre empire e-commerce pilote par l'IA."/>
  <meta name="robots" content="noindex, nofollow"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%237C3AED'/><text x='50' y='68' text-anchor='middle' fill='white' font-size='45' font-weight='bold'>AE</text></svg>"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #06070F;
      --s1: #0B0C1A;
      --s2: #111226;
      --s3: #171830;
      --border: rgba(139,92,246,.12);
      --border2: rgba(139,92,246,.2);
      --primary: #7C3AED;
      --primary-light: #A78BFA;
      --primary-glow: rgba(124,58,237,.25);
      --emerald: #34D399;
      --amber: #FBBF24;
      --red: #F87171;
      --text1: #F1F5F9;
      --text2: #94A3B8;
      --text3: #64748B;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text1);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-y: auto;
      position: relative;
    }
    .bg-gradient {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(124,58,237,.15), transparent 70%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(52,211,153,.06), transparent 60%);
      animation: bgPulse 8s ease-in-out infinite alternate;
    }
    @keyframes bgPulse { 0% { opacity:.7; } 100% { opacity:1; } }
    .orb {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: .1;
      animation: orbFloat 15s ease-in-out infinite alternate; z-index: 0;
    }
    .orb-1 { width:400px; height:400px; background:#7C3AED; top:-100px; right:-100px; }
    .orb-2 { width:300px; height:300px; background:#34D399; bottom:-80px; left:-80px; animation-delay:-5s; }
    @keyframes orbFloat {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-20px, 30px); }
    }

    .register-card {
      position: relative; z-index: 1;
      width: 100%; max-width: 440px;
      margin: 40px 20px;
      padding: 36px;
      background: rgba(17,18,38,.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border2);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,.4), 0 0 80px rgba(124,58,237,.06);
      animation: cardIn .6s cubic-bezier(.4,0,.2,1) both;
    }
    @keyframes cardIn { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }

    .logo-block {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-bottom: 24px;
    }
    .logo-icon {
      width: 36px; height: 36px; border-radius: 9px;
      background: linear-gradient(135deg, #7C3AED, #4F46E5);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900; color: #fff;
      box-shadow: 0 4px 16px rgba(124,58,237,.3);
    }
    .logo-text {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--text1), var(--primary-light));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .logo-version {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--primary-light); background: rgba(124,58,237,.15);
      padding: 2px 8px; border-radius: 6px; align-self: flex-start; margin-top: 4px;
    }
    .register-title {
      text-align: center; font-size: 13px; font-weight: 500;
      color: var(--text2); margin-bottom: 20px;
    }

    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 11px; font-weight: 600;
      color: var(--text3); text-transform: uppercase;
      letter-spacing: .5px; margin-bottom: 5px;
    }
    .input-wrapper { position: relative; }
    .input-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      font-size: 14px; color: var(--text3); pointer-events: none;
    }
    .form-input {
      width: 100%; padding: 11px 14px 11px 40px;
      background: var(--s3); border: 1px solid var(--border2);
      border-radius: 10px; color: var(--text1); font-family: inherit;
      font-size: 14px; outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .form-input::placeholder { color: var(--text3); }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
    .form-input.input-no-icon { padding-left: 14px; }

    /* Password strength */
    .strength-bar { height: 3px; border-radius: 3px; background: var(--s3); margin-top: 6px; overflow: hidden; }
    .strength-fill { height: 100%; border-radius: 3px; transition: width .3s, background .3s; width: 0; }
    .strength-label { font-size: 10px; color: var(--text3); margin-top: 4px; }

    .error-msg {
      display: none; background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.25); color: var(--red);
      padding: 10px 14px; border-radius: 10px; font-size: 13px;
      margin-bottom: 14px; text-align: center;
      animation: shake .4s ease-in-out;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }

    .btn-register {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #7C3AED, #6D28D9);
      color: #fff; border: none; border-radius: 10px;
      font-family: inherit; font-size: 13px; font-weight: 700;
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, opacity .2s;
      box-shadow: 0 4px 20px rgba(124,58,237,.3);
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-register:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,58,237,.4); }
    .btn-register:disabled { opacity: .7; cursor: not-allowed; }
    .spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:var(--text3); font-size:11px; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .footer-link { text-align:center; font-size:13px; color:var(--text3); }
    .footer-link a { color:var(--primary-light); text-decoration:none; font-weight:600; }
    .footer-link a:hover { color:var(--primary); }

    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width: 480px) {
      .register-card { padding: 28px 20px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="register-card">
    <div class="logo-block">
      <div class="logo-icon">AE</div>
      <span class="logo-text">AEGIS</span>
      <span class="logo-version">v12.3</span>
    </div>

    <div class="register-title">Creez votre compte et lancez votre empire e-commerce</div>

    <div id="register-error" class="error-msg"></div>

    <div class="form-group">
      <label class="form-label" for="reg-name">Nom complet</label>
      <div class="input-wrapper">
        <span class="input-icon" aria-hidden="true">&#128100;</span>
        <input type="text" id="reg-name" class="form-input" placeholder="Votre nom" autocomplete="name" aria-required="true" aria-label="Nom complet"/>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label" for="reg-email">Email</label>
      <div class="input-wrapper">
        <span class="input-icon" aria-hidden="true">&#9993;</span>
        <input type="email" id="reg-email" class="form-input" placeholder="votre@email.com" autocomplete="email" aria-required="true" aria-label="Adresse email"/>
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label" for="reg-password">Mot de passe</label>
        <div class="input-wrapper">
          <input type="password" id="reg-password" class="form-input input-no-icon" placeholder="Min. 12 caracteres" autocomplete="new-password" oninput="checkStrength()" aria-required="true" aria-label="Mot de passe" aria-describedby="strength-label"/>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer</label>
        <div class="input-wrapper">
          <input type="password" id="reg-confirm" class="form-input input-no-icon" placeholder="Confirmez" autocomplete="new-password"/>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Nom de boutique <span style="font-weight:400;text-transform:none">(optionnel)</span></label>
      <div class="input-wrapper">
        <span class="input-icon">&#127978;</span>
        <input type="text" id="reg-shop" class="form-input" placeholder="Ma Boutique"/>
      </div>
    </div>

    <button class="btn-register" id="register-btn" onclick="register()">
      Creer mon compte
    </button>

    <div class="divider">ou</div>

    <div class="footer-link">
      Deja un compte ? <a href="/login">Se connecter</a>
    </div>
  </div>

  <script>
    const AEGIS_API = window.AEGIS_API_URL || '';

    function checkStrength() {
      const pw = document.getElementById('reg-password').value;
      const fill = document.getElementById('strength-fill');
      const label = document.getElementById('strength-label');
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;

      const pct = (score / 5) * 100;
      fill.style.width = pct + '%';
      if (score <= 1) { fill.style.background = 'var(--red)'; label.textContent = 'Faible'; label.style.color = 'var(--red)'; }
      else if (score <= 3) { fill.style.background = 'var(--amber)'; label.textContent = 'Moyen'; label.style.color = 'var(--amber)'; }
      else { fill.style.background = 'var(--emerald)'; label.textContent = 'Fort'; label.style.color = 'var(--emerald)'; }
      if (!pw) { label.textContent = ''; fill.style.width = '0'; }
    }

    function showError(msg) {
      const el = document.getElementById('register-error');
      el.textContent = msg;
      el.style.display = 'block';
      el.style.animation = 'none';
      el.offsetHeight;
      el.style.animation = 'shake .4s ease-in-out';
    }

    async function register() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;
      const shop = document.getElementById('reg-shop').value.trim();
      const errorEl = document.getElementById('register-error');
      const btn = document.getElementById('register-btn');

      errorEl.style.display = 'none';

      if (!name || !email || !password) {
        showError('Tous les champs obligatoires doivent etre remplis');
        return;
      }
      if (password.length < 12) {
        showError('Le mot de passe doit faire au moins 12 caracteres');
        return;
      }
      if (password !== confirm) {
        showError('Les mots de passe ne correspondent pas');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Creation...';

      try {
        const res = await fetch(AEGIS_API + '/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, full_name: name, shop_name: shop || name })
        });
        const data = await res.json();

        if (!res.ok) {
          showError(data.error || 'Erreur lors de la creation');
          btn.disabled = false;
          btn.innerHTML = 'Creer mon compte';
          return;
        }

        // Auto-login
        localStorage.setItem('aegis_token', data.token);
        localStorage.setItem('aegis_user', JSON.stringify(data.user));
        window.location.href = '/ui/dashboard.html';
      } catch (err) {
        showError('Erreur de connexion au serveur');
        btn.disabled = false;
        btn.innerHTML = 'Creer mon compte';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') register();
    });
  </script>
</body>
</html>
